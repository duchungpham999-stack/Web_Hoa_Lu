<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Hoa Lu Land</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="recruitment-hero">
            <div class="hero-overlay">
                <h1>CAREER INFORMATION</h1>
                <div class="filter-container">
                    <div class="filter-item">
                        <span class="label">Position</span>
                        <select id="position-filter">
                            <option value="">Select a position</option>
                            <option value="kinh-doanh">Investment Planning Specialist</option>
                            <option value="XNK">Import-Export Specialist</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <span class="label">Location</span>
                        <select id="location-filter">
                            <option value="">Select work location</option>
                            <option value="ha-noi">Hanoi</option>
                            <option value="hcm">Ho Chi Minh City</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="job-opportunity">
            <h2 class="section-title">CAREER OPPORTUNITIES AT HOA LU JSC</h2>
            <div class="job-list-section">
                <table class="recruitment-table">
                    <thead>
                        <tr>
                            <th>POSITION</th>
                            <th>SALARY</th>
                            <th>OPENINGS</th>
                            <th>LOCATION</th>
                            <th>DEADLINE</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-position="kinh-doanh" data-location="ha-noi">
                            <td class="job-title">
                                <a href="KHDT-en.html" class="job-link">Investment Planning Specialist - Real Estate</a>
                            </td>
                            <td>Negotiable</td>
                            <td>02</td>
                            <td>Hanoi</td>
                            <td>30/05/2026</td>
                        </tr>
                        <tr data-position="XNK" data-location="hcm">
                            <td class="job-title">Import-Export Specialist</td>
                            <td>800$ - 1200$</td>
                            <td>01</td>
                            <td>Ho Chi Minh City</td>
                            <td>15/06/2026</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
