<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên hệ | Hoa Lư Land</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<body>
    <div id="header-placeholder"></div>

    <main class="hero-padding"> 
        <section class="contact-banner">
            <div class="overlay">
                <h1>LIÊN HỆ VỚI CHÚNG TÔI</h1>
            </div>
        </section>

        <div class="contact-section" id="contact-form-section">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2 class="section-title">CÔNG TY CỔ PHẦN XUẤT NHẬP KHẨU HOA LƯ</h2>
            
                    <div class="info-content">
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <p><strong>Địa chỉ:</strong> Tòa nhà Hoàng Cầu Skyline, 36 Hoàng Cầu, phường Ô Chợ Dừa, thành phố Hà Nội, Việt Nam</p>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-phone-alt"></i>
                            <p><strong>Điện thoại:</strong> (+84) 349 301 248</p>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <p><strong>Email:</strong> duchungpham2001@gmail.com</p>
                        </div>
                    </div>

                    <div class="map-box">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1270.5481917293316!2d105.82347116965185!3d21.01847679878928!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3135abb31079d4bd%3A0xee4e79610e6337f1!2zVG_DoCBuaMOgIEhvw6BuZyBD4bqndSBTa3lsaW5l!5e1!3m2!1svi!2s!4v1776737158180!5m2!1svi!2s" 
                            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>
               <div class="contact-form-container">
                    <h2 class="section-title border-title">GỬI YÊU CẦU TƯ VẤN</h2>
                    <form id="mainContactForm" action="https://script.google.com/macros/s/AKfycbyQqQAxSVgIG0wsPghpAJ4w5d99sXdRN-ZlZkzruY_XfzgRF9fSpYCy8GqH0TaqsfQu/exec" method="POST">
                        <div class="form-group">
                            <input type="text" name="fullname" placeholder="Họ và tên *" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Email *" required>
                        </div>
                        <div class="form-group">
                            <input type="text" name="phone" placeholder="Số điện thoại">
                        </div>
                        <div class="form-group">
                            <textarea name="message" rows="4" placeholder="Nội dung cần tư vấn"></textarea>
                        </div>
                        <div class="form-group">
                            <div class="g-recaptcha" data-sitekey="6Lc6GMIsAAAAAPa-ZbAI2IzjArvIh4wuFu2feqrX"></div>
                        </div>
                        <button type="submit" class="btn-send">Gửi yêu cầu</button>
                        <div id="contact-status"></div>
                    </form>
                </div>
            </div>
        </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
